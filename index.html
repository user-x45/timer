<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>タイマー</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --text: #222;
      --box-bg: #fff;
      --box-shadow: rgba(0, 0, 0, 0.1);
      --btn-start: #4CAF50;
      --btn-stop: #f39c12;
      --btn-reset: #e74c3c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      font-size: 16px;
      background: var(--bg) no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      display: flex;
      justify-content: center;
      overflow: hidden;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      touch-action:none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout:none;
      -moz-user-select: none;
      -moz-touch-callout:none;
    }

    .container {
      text-align: center;
      margin-top: 20px;
      height: fit-content;
    }

    .hidden {
      display: none;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 26px;
    }

    .inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .inputs input {
      width: 70px;
      font-size: 24px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
      background: var(--box-bg);
      color: var(--text);
    }

    .label {
      font-size: 16px;
      margin: 0 4px;
      display: flex;
      align-items: center;
    }

    button {
      font-size: 18px;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 2px 6px var(--box-shadow);
      margin: 10px 6px;
    }

    button:hover {
      opacity: 0.9;
    }

    .start { background-color: var(--btn-start); color: white; }
    .stop  { background-color: var(--btn-stop);  color: white; }
    .reset { background-color: var(--btn-reset); color: white; }

    #display {
      font-size: 56px;
      font-weight: bold;
      background: var(--box-bg);
      color: var(--text);
      padding: 24px 48px;
      border-radius: 16px;
      box-shadow: 0 4px 10px var(--box-shadow);
      margin: 30px 0;
    }

    @media (min-width: 768px) {
      body {
        font-size: 18px;
      }

      h1 {
        font-size: 32px;
      }

      .inputs input {
        font-size: 28px;
        width: 80px;
      }

      .label {
        font-size: 18px;
      }

      button {
        font-size: 20px;
        padding: 16px 32px;
      }

      #display {
        font-size: 72px;
        padding: 30px 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 初期入力画面 -->
    <div id="setup-screen">
      <h1><ruby>時間<rp>(</rp><rt>じかん</rt><rp>)</rp></ruby>を<ruby>設定<rp>(</rp><rt>せってい</rt><rp>)</rp></ruby>してください</h1>
      <div class="inputs">
        <input id="minutes" type="number" min="0" max="59" value="0" />
        <span class="label">分</span>
        <input id="seconds" type="number" min="0" max="59" value="0" />
        <span class="label">秒</span>
      </div>
      <button class="start" onclick="startCountdown()">スタート</button>
      <button class="reset" onclick="resetInputs()">リセット</button>
    </div>

    <!-- カウントダウン画面 -->
    <div id="countdown-screen" class="hidden">
      <h1>カウントダウン<ruby>中<rp>(</rp><rt>ちゅう</rt><rp>)</rp></ruby></h1>
      <div id="display">00分00秒</div>
      <button class="start" onclick="resumeCountdown()">スタート</button>
      <button class="stop" onclick="pauseCountdown()">ストップ</button>
      <button class="reset" onclick="resetCountdown()">リセット</button>
    </div>

    <!-- 終了画面 -->
    <div id="finished-screen" class="hidden">
      <h1><ruby>時間<rp>(</rp><rt>じかん</rt><rp>)</rp></ruby>になりました！</h1>
      <button class="stop" onclick="returnToSetup()">ストップ</button>
    </div>
  </div>

  <!-- アラーム音 -->
  <audio id="alarm-sound" preload="auto" loop>
    <source src="https://user-b4h.github.io/timer/alerm1.mp3" type="audio/mp3" />
  </audio>

  <script>
    let countdown;
    let totalSeconds = 0;
    let running = false;

    const setupScreen = document.getElementById('setup-screen');
    const countdownScreen = document.getElementById('countdown-screen');
    const finishedScreen = document.getElementById('finished-screen');
    const display = document.getElementById('display');
    const alarmSound = document.getElementById('alarm-sound');

    function setRandomBackground() {
      const images = ['https://user-b4h.github.io/timer/images/img1.jpg', 'https://user-b4h.github.io/timer/images/img2.jpg', 'https://user-b4h.github.io/timer/images/img3.jpg', 'https://user-b4h.github.io/timer/images/img4.jpg'];
      const selected = images[Math.floor(Math.random() * images.length)];
      document.body.style.backgroundImage = `url(${selected})`;
    }

    function updateDisplay() {
      const mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const secs = String(totalSeconds % 60).padStart(2, '0');
      display.textContent = `${mins}分${secs}秒`;
    }

    function startCountdown() {
      if (running) return;

      const minsInput = document.getElementById('minutes').value;
      const secsInput = document.getElementById('seconds').value;

      if (!/^\d+$/.test(minsInput) || !/^\d+$/.test(secsInput)) {
        return; // 数字でない場合は何もしない
      }

      if (totalSeconds === 0) {
        const mins = parseInt(minsInput, 10);
        const secs = parseInt(secsInput, 10);
        totalSeconds = mins * 60 + secs;

        if (totalSeconds <= 0) {
          alert('0より大きい時間を設定してください');
          return;
        }
      }

      alarmSound.currentTime = 0;
      alarmSound.muted = true;
      alarmSound.play().then(() => {
        alarmSound.pause();
        alarmSound.muted = false;
        alarmSound.currentTime = 0;
      }).catch(() => {});

      setupScreen.classList.add('hidden');
      countdownScreen.classList.remove('hidden');

      running = true;
      updateDisplay();

      countdown = setInterval(() => {
        if (totalSeconds > 0) {
          totalSeconds--;
          updateDisplay();
        } else {
          clearInterval(countdown);
          running = false;
          playBeep();
          showFinishedScreen();
        }
      }, 1000);
    }

    function resumeCountdown() {
      if (running || totalSeconds === 0) return;

      running = true;
      countdown = setInterval(() => {
        if (totalSeconds > 0) {
          totalSeconds--;
          updateDisplay();
        } else {
          clearInterval(countdown);
          running = false;
          playBeep();
          showFinishedScreen();
        }
      }, 1000);
    }

    function pauseCountdown() {
      clearInterval(countdown);
      running = false;
    }

    function resetCountdown() {
      pauseCountdown();
      totalSeconds = 0;
      updateDisplay();
      countdownScreen.classList.add('hidden');
      setupScreen.classList.remove('hidden');
    }

    function resetInputs() {
      document.getElementById('minutes').value = 0;
      document.getElementById('seconds').value = 0;
    }

    function playBeep() {
      alarmSound.currentTime = 0;
      alarmSound.play();
    }

    function stopBeep() {
      alarmSound.pause();
      alarmSound.currentTime = 0;
    }

    function showFinishedScreen() {
      countdownScreen.classList.add('hidden');
      finishedScreen.classList.remove('hidden');
    }

    function returnToSetup() {
      stopBeep();
      finishedScreen.classList.add('hidden');
      setupScreen.classList.remove('hidden');
      totalSeconds = 0;
      updateDisplay();
    }

    window.onload = () => {
      setRandomBackground();
      updateDisplay();
    }
  </script>
  <script>
    document.oncontextmenu = function(){
    return false;
    };
  </script>
</body>
</html>
