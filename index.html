<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<title>時計</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --accent: #4cc2ff;
    --accent-hover: #6bcdff;
    --accent-press: #2fa9e8;
    --bg-app: #20262e;
    --bg-nav: #171c22;
    --bg-card: #2a313aee;
    --bg-card-hover: #323a44;
    --bg-pill: #3a424d;
    --bg-pill-disabled: #ffffff14;
    --bg-dialog: #2b323b;
    --bg-input: #1d2227;
    --text-primary: #f2f5f8;
    --text-secondary: #9aa6b2;
    --text-disabled: #5a6470;
    --divider: #ffffff12;
    --ring-track: #ffffff1f;
    --font: "BIZ UDPGothic", "HiraginoSans-W2", "Hiragino Kaku Gothic ProN", Meiryo, "メイリオ", sans-serif;
  }

  :root.theme-light {
    --accent: #0078d4;
    --accent-hover: #106ebe;
    --accent-press: #005a9e;
    --bg-app: #f3f3f3;
    --bg-nav: #eaeaea;
    --bg-card: #ffffff;
    --bg-card-hover: #f9f9f9;
    --bg-pill: #e5e5e5;
    --bg-pill-disabled: #0000000a;
    --bg-dialog: #ffffff;
    --bg-input: #f5f5f5;
    --text-primary: #242424;
    --text-secondary: #5c5c5c;
    --text-disabled: #a1a1a1;
    --divider: #0000000f;
    --ring-track: #0000000f;
  }

  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) {
      --accent: #0078d4;
      --accent-hover: #106ebe;
      --accent-press: #005a9e;
      --bg-app: #f3f3f3;
      --bg-nav: #eaeaea;
      --bg-card: #ffffff;
      --bg-card-hover: #f9f9f9;
      --bg-pill: #e5e5e5;
      --bg-pill-disabled: #0000000a;
      --bg-dialog: #ffffff;
      --bg-input: #f5f5f5;
      --text-primary: #242424;
      --text-secondary: #5c5c5c;
      --text-disabled: #a1a1a1;
      --divider: #0000000f;
      --ring-track: #0000000f;
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: var(--font);
    background: var(--bg-app);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    user-select: none;
  }
  body {
    background-image: radial-gradient(circle at 20% 0%, #2c3a4855, transparent 55%);
  }
  :root.theme-light body {
    background-image: radial-gradient(circle at 20% 0%, #0078d411, transparent 55%);
  }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) body {
      background-image: radial-gradient(circle at 20% 0%, #0078d411, transparent 55%);
    }
  }
  input, button { font-family: var(--font); }

  .app { display: flex; height: 100vh; width: 100vw; }

  .titlebar {
    position: absolute; top: 0; left: 0; right: 0; height: 32px;
    z-index: 60; pointer-events: none;
  }

  .nav {
    width: 272px;
    background: var(--bg-nav);
    display: flex; flex-direction: column;
    padding: 14px 0 16px;
    flex-shrink: 0;
    border-right: 1px solid var(--divider);
  }
  .nav-title {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 20px 18px;
    font-size: 14px; font-weight: 600;
  }
  .nav-title .logo {
    font-size: 18px;
    color: var(--accent);
  }
  .nav-section { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
  .nav-bottom { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; margin-top: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    position: relative;
  }
  .nav-item:hover { background: #ffffff0d; color: var(--text-primary); }
  :root.theme-light .nav-item:hover { background: #0000000a; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .nav-item:hover { background: #0000000a; }
  }
  .nav-item.active { background: #ffffff14; color: var(--text-primary); }
  :root.theme-light .nav-item.active { background: #0000000f; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .nav-item.active { background: #0000000f; }
  }
  .nav-item.active::before {
    content: ""; position: absolute; left: -8px; top: 9px; bottom: 9px; width: 3px;
    border-radius: 4px; background: var(--accent);
  }
  .nav-item i { width: 19px; height: 19px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-nav);
    border-top: 1px solid var(--divider);
    height: 60px;
    z-index: 50;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    padding: 4px 0;
  }

  .bottom-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    flex: 1;
    padding: 4px 0;
    gap: 2px;
  }

  .bottom-nav-item i {
    font-size: 20px;
  }

  .bottom-nav-item.active {
    color: var(--accent);
  }

  .bottom-nav-item.active i {
    color: var(--accent);
  }

  .main {
    flex: 1;
    display: flex; flex-direction: column;
    padding-top: 0;
    overflow: hidden;
    position: relative;
  }
  .view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }

  .timer-grid-wrap {
    flex: 1; overflow-y: auto; padding: 28px 28px 90px;
  }
  .timer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    max-width: 1400px;
  }

  .timer-card {
    background: var(--bg-card);
    border-radius: 8px;
    border: 1px solid var(--divider);
    padding: 16px;
    display: flex; flex-direction: column;
    min-height: 320px;
    cursor: pointer;
    transition: opacity 0.15s, filter 0.15s;
  }
  .timer-card:hover { background: var(--bg-card-hover); }
  
  .timer-card.edit-mode {
    cursor: pointer;
  }
  .timer-card.edit-mode .timer-card-title,
  .timer-card.edit-mode .timer-ring-box,
  .timer-card.edit-mode .timer-card-controls {
    opacity: 0.5;
    filter: grayscale(0.6);
  }
  .timer-card.edit-mode:hover .timer-card-title,
  .timer-card.edit-mode:hover .timer-ring-box,
  .timer-card.edit-mode:hover .timer-card-controls {
    opacity: 0.7;
    filter: grayscale(0.3);
  }

  .timer-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .timer-card-title {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
  }
  .delete-btn {
    width: 30px; height: 10px; border-radius: 4px;
    display: none; align-items: center; justify-content: center;
    color: #ff7b6b; cursor: pointer;
    border: none; background: transparent;
    z-index: 10;
  }
  .timer-card.edit-mode .delete-btn { display: flex; }
  .delete-btn:hover { background: #ff7b6b22; }
  .delete-btn i { font-size: 16px; }

  .timer-card-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
  }
  .timer-ring-box {
    position: relative; width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }
  .timer-ring-box svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track-c { fill: none; stroke: var(--ring-track); stroke-width: 3; }
  .ring-progress-c {
    fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
    transition: stroke-dashoffset 0.1s linear;
  }
  .timer-card-time {
    position: absolute;
    font-size: 27px; font-weight: 600;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    text-align: center;
  }
  .timer-card-time.finished { color: #ff6b5e; }

  .timer-card.edit-mode .timer-card-controls {
    pointer-events: none;
  }
  .timer-card-controls { display: flex; gap: 10px; }
  .pill-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, transform 0.05s;
  }
  .pill-btn i { font-size: 14px; }
  .pill-btn.play {
    background: var(--accent); color: #00263b;
  }
  :root.theme-light .pill-btn.play { color: #ffffff; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .pill-btn.play { color: #ffffff; }
  }
  .pill-btn.play:hover { background: var(--accent-hover); }
  .pill-btn.play:active { background: var(--accent-press); transform: scale(0.95); }
  .pill-btn.secondary {
    background: var(--bg-pill); color: var(--text-primary);
  }
  .pill-btn.secondary:hover { background: #454d58; }
  :root.theme-light .pill-btn.secondary:hover { background: #d5d5d5; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .pill-btn.secondary:hover { background: #d5d5d5; }
  }
  .pill-btn.secondary:disabled {
    background: var(--bg-pill-disabled); color: var(--text-disabled);
    cursor: default; pointer-events: none;
  }

  .add-card {
    background: transparent;
    border: 1.5px dashed #ffffff2a;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    min-height: 320px;
    color: var(--text-secondary);
    cursor: pointer;
    flex-direction: column;
    gap: 10px;
  }
  :root.theme-light .add-card { border: 1.5px dashed #0000002a; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .add-card { border: 1.5px dashed #0000002a; }
  }
  .add-card:hover { border-color: #ffffff4a; color: var(--text-primary); background: #ffffff08; }
  :root.theme-light .add-card:hover { border-color: #0000004a; background: #00000004; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .add-card:hover { border-color: #0000004a; background: #00000004; }
  }
  .add-card i { font-size: 24px; }
  .add-card span { font-size: 13px; }

  .fab-row {
    position: fixed; right: 28px; bottom: 24px;
    display: flex; gap: 10px;
    z-index: 55;
  }
  .fab {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg-pill);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-primary);
  }
  .fab:hover { background: #454d58; }
  :root.theme-light .fab:hover { background: #d5d5d5; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .fab:hover { background: #d5d5d5; }
  }
  .fab i { font-size: 16px; }
  .fab.primary { background: var(--accent); color: #00263b; }
  :root.theme-light .fab.primary { color: #ffffff; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .fab.primary { color: #ffffff; }
  }
  .fab.primary:hover { background: var(--accent-hover); }
  .fab.active { background: var(--accent); color: #00263b; }
  :root.theme-light .fab.active { color: #ffffff; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .fab.active { color: #ffffff; }
  }
  .fab.active:hover { background: var(--accent-hover); }

  .overlay {
    position: absolute; inset: 0;
    background: #00000066;
    display: none;
    align-items: center; justify-content: center;
    z-index: 70;
  }
  .overlay.active { display: flex; }
  .dialog {
    background: var(--bg-dialog);
    border: 1px solid var(--divider);
    border-radius: 8px;
    padding: 28px;
    width: 380px;
    box-shadow: 0 20px 60px #00000055;
  }
  .dialog h2 { font-size: 18px; font-weight: 600; margin: 0; }
  .dialog-head-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .dialog-delete-btn {
    width: 34px; height: 34px; border-radius: 4px;
    display: none; align-items: center; justify-content: center;
    color: #ff7b6b; cursor: pointer;
    border: none; background: transparent;
  }
  .dialog-delete-btn i { font-size: 16px; }
  .dialog-delete-btn:hover { background: #ff7b6b22; }

  .spinner-row {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    margin-bottom: 22px;
  }
  .spinner-group {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .spin-arrow {
    width: 28px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); cursor: pointer; border-radius: 4px;
  }
  .spin-arrow:hover { background: #ffffff14; color: var(--text-primary); }
  :root.theme-light .spin-arrow:hover { background: #0000000a; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .spin-arrow:hover { background: #0000000a; }
  }
  .spin-arrow i { font-size: 12px; }
  .spinner-group input {
    width: 78px; height: 70px;
    text-align: center;
    font-size: 34px; font-weight: 600;
    line-height: 70px;
    font-variant-numeric: tabular-nums;
    background: var(--bg-input);
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-primary);
    outline: none;
    border-radius: 4px 4px 0 0;
    padding: 0;
    -webkit-text-size-adjust: 100%;
  }
  .spinner-group input:focus { border-bottom-color: var(--accent); background: #23282e; }
  :root.theme-light .spinner-group input:focus { background: #eaeaea; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .spinner-group input:focus { background: #eaeaea; }
  }
  .spinner-group input::-webkit-outer-spin-button,
  .spinner-group input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .spin-colon { font-size: 28px; color: var(--text-secondary); align-self: center; margin: 0 2px 26px; }

  .name-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 26px;
  }
  .name-row i { font-size: 16px; color: var(--text-secondary); flex-shrink: 0; }
  .name-row input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--divider);
    border-radius: 4px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
  }
  .name-row input:focus { border-color: var(--accent); }

  .dialog-actions { display: flex; gap: 10px; }
  .dlg-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px;
    border-radius: 4px;
    font-size: 14px; font-weight: 500;
    border: none; cursor: pointer;
  }
  .dlg-btn i { font-size: 14px; }
  .dlg-btn.save { background: var(--accent); color: #00263b; }
  :root.theme-light .dlg-btn.save { color: #ffffff; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .dlg-btn.save { color: #ffffff; }
  }
  .dlg-btn.save:hover { background: var(--accent-hover); }
  .dlg-btn.cancel { background: var(--bg-pill); color: var(--text-primary); }
  .dlg-btn.cancel:hover { background: #454d58; }
  :root.theme-light .dlg-btn.cancel:hover { background: #d5d5d5; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .dlg-btn.cancel:hover { background: #d5d5d5; }
  }

  .sw-view {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding-top: 70px;
    position: relative;
    width: 100%;
  }
  .sw-time-block {
    display: flex; align-items: baseline; justify-content: center;
    font-variant-numeric: tabular-nums;
  }
  .sw-digit-group { display: flex; flex-direction: column; align-items: center; }
  .sw-digit-group .num { font-size: 68px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
  .sw-digit-group .lbl { font-size: 15px; color: var(--text-secondary); margin-top: 10px; }
  .sw-colon { font-size: 68px; font-weight: 600; color: var(--text-primary); padding: 0 2px; align-self: flex-start; line-height: 1; }
  .sw-ms { font-size: 38px; font-weight: 600; color: var(--text-secondary); align-self: flex-start; margin-left: 2px; }

  .sw-controls { display: flex; gap: 18px; margin-top: 46px; }
  .sw-controls .pill-btn { width: 64px; height: 64px; }
  .sw-controls .pill-btn i { font-size: 20px; }

  .laps-panel {
    margin-top: 36px; width: 380px; max-height: 220px;
    overflow-y: auto;
  }
  .laps-panel::-webkit-scrollbar { width: 6px; }
  .laps-panel::-webkit-scrollbar-thumb { background: #ffffff22; border-radius: 3px; }
  :root.theme-light .laps-panel::-webkit-scrollbar-thumb { background: #00000022; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .laps-panel::-webkit-scrollbar-thumb { background: #00000022; }
  }
  .lap-row {
    display: flex; justify-content: space-between;
    padding: 9px 4px;
    font-size: 14px; color: var(--text-secondary);
    border-bottom: 1px solid var(--divider);
    font-variant-numeric: tabular-nums;
  }
  .lap-row .lap-index { color: var(--text-primary); }
  .lap-row.fastest .lap-diff { color: #5fd068; }
  .lap-row.slowest .lap-diff { color: #ff6b5e; }

  .settings-view {
    flex: 1; overflow-y: auto; padding: 40px; max-width: 800px; width: 100%; margin: 0 auto;
  }
  .settings-view h1 { font-size: 28px; font-weight: 600; margin: 0 0 24px 0; }
  .settings-section {
    background: var(--bg-card);
    border: 1px solid var(--divider);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .settings-section h2 { font-size: 16px; font-weight: 600; margin: 0 0 16px 0; }
  .radio-group { display: flex; flex-direction: column; gap: 12px; }
  .radio-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--text-primary);
    cursor: pointer;
  }
  .radio-label input[type="radio"] {
    margin: 0; width: 18px; height: 18px;
    accent-color: var(--accent);
  }
  .danger-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 4px;
    font-size: 14px; font-weight: 500;
    border: none; cursor: pointer;
    background: #ff7b6b22; color: #ff7b6b;
    transition: background 0.1s;
  }
  .danger-btn:hover { background: #ff7b6b33; }
  .danger-btn:active { background: #ff7b6b44; }

  .toast-stack {
    position: fixed;
    right: 16px;
    bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
    pointer-events: none;
  }
  .toast {
    width: 360px;
    background: #2c333ce6;
    backdrop-filter: blur(24px);
    border: 1px solid #ffffff1c;
    border-radius: 8px;
    box-shadow: 0 12px 40px #00000066, 0 0 0 1px #00000033;
    overflow: hidden;
    pointer-events: auto;
    cursor: pointer;
    transform: translateX(420px);
    opacity: 0;
    transition: transform 0.32s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.32s ease;
  }
  :root.theme-light .toast { background: #ffffffeb; border: 1px solid #0000001c; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .toast {
      background: #ffffffeb;
      border: 1px solid #0000001c;
    }
  }
  .toast.show { transform: translateX(0); opacity: 1; }
  .toast.hide { transform: translateX(420px); opacity: 0; }

  .toast-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 8px 10px 14px;
  }
  .toast-head .toast-logo {
    font-size: 14px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .toast-head .toast-app-name {
    font-size: 12px; color: var(--text-secondary);
    flex: 1;
  }
  .toast-close {
    width: 28px; height: 28px; border-radius: 4px;
    border: none; background: transparent;
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toast-close:hover { background: #ffffff1a; color: var(--text-primary); }
  :root.theme-light .toast-close:hover { background: #0000000a; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .toast-close:hover { background: #0000000a; }
  }
  .toast-close i { font-size: 12px; }

  .toast-body {
    padding: 0 16px 14px;
  }
  .toast-body .toast-title {
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .toast-body .toast-sub {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.5;
  }

  .toast-action {
    display: block;
    width: 100%;
    padding: 11px 0;
    background: transparent;
    border: none;
    border-top: 1px solid #ffffff1c;
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
  }
  :root.theme-light .toast-action { border-top: 1px solid #0000001c; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .toast-action { border-top: 1px solid #0000001c; }
  }
  .toast-action:hover { background: #ffffff14; }
  :root.theme-light .toast-action:hover { background: #0000000a; }
  @media (prefers-color-scheme: light) {
    :root:not(.theme-dark) .toast-action:hover { background: #0000000a; }
  }

  @media (max-width: 900px) {
    .nav { width: 220px; }
  }
  @media (max-width: 700px) {
    .nav {
      display: none;
    }
    .bottom-nav {
      display: flex;
    }
    .main {
      padding-left: 0;
      margin-left: 0;
    }
    .nav-title span, .nav-item span, .nav-bottom span { display: none; }
    .nav-title { justify-content: center; padding: 8px 0 18px; }
    .nav-item { justify-content: center; padding: 10px; }
    .sw-digit-group .num { font-size: 42px; }
    .sw-colon, .sw-ms { font-size: 26px; }
    .sw-controls {
      width: 100%;
      padding: 0 20px;
      gap: 10px;
    }
    .sw-controls .pill-btn {
      flex: 1;
      width: auto;
      border-radius: 8px;
    }
    .laps-panel {
      width: calc(100% - 40px);
    }
    .timer-grid-wrap {
      padding: 20px 16px 100px;
    }
    .timer-grid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .fab-row {
      right: 16px;
      bottom: 76px;
    }
    .dialog {
      width: 92%;
      max-width: 380px;
      padding: 20px;
    }
    .spinner-group input {
      width: 58px;
      height: 58px;
      font-size: 26px;
      line-height: 58px;
    }
    .spin-colon {
      font-size: 22px;
      margin: 0 1px 22px;
    }
    .spin-arrow {
      width: 24px;
      height: 18px;
    }
    .spinner-row {
      gap: 2px;
    }
  }

  @media (max-width: 700px) {
    .main {
      padding-top: 0;
      padding-bottom: 60px;
    }
    .toast-stack {
      top: 16px;
      right: 16px;
      left: 16px;
      bottom: auto;
    }
    .toast {
      width: 100%;
      transform: translateY(-120px);
    }
    .toast.show { transform: translateY(0); }
    .toast.hide { transform: translateY(-120px); }
  }

  button:focus-visible, input:focus-visible, .nav-item:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<div class="titlebar"></div>

<div class="app">
  <nav class="nav">
    <div class="nav-title"><i class="fa-solid fa-clock logo"></i><span>時計</span></div>
    <div class="nav-section">
      <div class="nav-item" data-view="timer-grid" title="タイマー">
        <i class="fa-solid fa-hourglass-half"></i>
        <span>タイマー</span>
      </div>
      <div class="nav-item" data-view="stopwatch" title="ストップウォッチ">
        <i class="fa-solid fa-stopwatch"></i>
        <span>ストップウォッチ</span>
      </div>
    </div>
    <div class="nav-bottom">
      <div class="nav-item" data-view="settings" title="設定">
        <i class="fa-solid fa-gear"></i>
        <span>設定</span>
      </div>
    </div>
  </nav>

  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav-item active" data-view="timer-grid">
      <i class="fa-solid fa-hourglass-half"></i>
      <span>タイマー</span>
    </div>
    <div class="bottom-nav-item" data-view="stopwatch">
      <i class="fa-solid fa-stopwatch"></i>
      <span>ストップウォッチ</span>
    </div>
    <div class="bottom-nav-item" data-view="settings">
      <i class="fa-solid fa-gear"></i>
      <span>設定</span>
    </div>
  </nav>

  <div class="main">

    <div class="view active" id="view-timer-grid">
      <div class="timer-grid-wrap">
        <div class="timer-grid" id="timer-grid"></div>
      </div>
      <div class="fab-row">
        <button class="fab" id="edit-mode-btn" title="編集">
          <i class="fa-solid fa-pen"></i>
        </button>
        <button class="fab primary" id="open-add-dialog" title="新しいタイマーの追加">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
    </div>

    <div class="view" id="view-stopwatch">
      <div class="sw-view">
        <div class="sw-time-block">
          <div class="sw-digit-group"><span class="num" id="sw-h">00</span><span class="lbl">時間</span></div>
          <span class="sw-colon">:</span>
          <div class="sw-digit-group"><span class="num" id="sw-m">00</span><span class="lbl">分</span></div>
          <span class="sw-colon">:</span>
          <div class="sw-digit-group"><span class="num" id="sw-s">00</span><span class="lbl">秒</span></div>
          <span class="sw-ms" id="sw-cs">.00</span>
        </div>

        <div class="sw-controls">
          <button class="pill-btn play" id="sw-start" title="開始">
            <i class="fa-solid fa-play" id="sw-icon"></i>
          </button>
          <button class="pill-btn secondary" id="sw-lap" disabled title="ラップ">
            <i class="fa-solid fa-flag"></i>
          </button>
          <button class="pill-btn secondary" id="sw-reset" disabled title="リセット">
            <i class="fa-solid fa-arrow-rotate-left"></i>
          </button>
        </div>

        <div class="laps-panel" id="laps-panel"></div>
      </div>
    </div>

    <div class="view" id="view-settings">
      <div class="settings-view">
        <h1>設定</h1>
        <div class="settings-section">
          <h2>アプリ テーマ</h2>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="app-theme" value="system" checked>
              <span>システム設定を使用する</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="app-theme" value="light">
              <span>ライト</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="app-theme" value="dark">
              <span>ダーク</span>
            </label>
          </div>
        </div>
        <div class="settings-section">
          <h2>アプリのリセット</h2>
          <button class="danger-btn" id="app-reset-btn">
            <i class="fa-solid fa-trash-arrow-up"></i>
            アプリをリセット
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="overlay" id="dialog-overlay">
  <div class="dialog">
    <div class="dialog-head-row">
      <h2 id="dialog-title">新しいタイマーの追加</h2>
      <button class="dialog-delete-btn" id="d-delete" title="削除">
        <i class="fa-regular fa-trash-can"></i>
      </button>
    </div>
    <div class="spinner-row">
      <div class="spinner-group">
        <div class="spin-arrow" data-target="d-h" data-dir="1"><i class="fa-solid fa-chevron-up"></i></div>
        <input type="text" id="d-h" value="00" maxlength="2" inputmode="numeric">
        <div class="spin-arrow" data-target="d-h" data-dir="-1"><i class="fa-solid fa-chevron-down"></i></div>
      </div>
      <span class="spin-colon">:</span>
      <div class="spinner-group">
        <div class="spin-arrow" data-target="d-m" data-dir="1"><i class="fa-solid fa-chevron-up"></i></div>
        <input type="text" id="d-m" value="00" maxlength="2" inputmode="numeric">
        <div class="spin-arrow" data-target="d-m" data-dir="-1"><i class="fa-solid fa-chevron-down"></i></div>
      </div>
      <span class="spin-colon">:</span>
      <div class="spinner-group">
        <div class="spin-arrow" data-target="d-s" data-dir="1"><i class="fa-solid fa-chevron-up"></i></div>
        <input type="text" id="d-s" value="00" maxlength="2" inputmode="numeric">
        <div class="spin-arrow" data-target="d-s" data-dir="-1"><i class="fa-solid fa-chevron-down"></i></div>
      </div>
    </div>
    <div class="name-row">
      <i class="fa-solid fa-pen"></i>
      <input type="text" id="d-name" placeholder="" maxlength="40">
    </div>
    <div class="dialog-actions">
      <button class="dlg-btn save" id="d-save">
        <i class="fa-regular fa-floppy-disk"></i>
        保存
      </button>
      <button class="dlg-btn cancel" id="d-cancel">
        <i class="fa-solid fa-xmark"></i>
        キャンセル
      </button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script>
  function pad(n, len = 2) { return String(Math.max(0, Math.floor(n))).padStart(len, '0'); }

  document.querySelectorAll('.nav-item[data-view]').forEach(item => {
    item.addEventListener('click', () => {
      initializeAudio();
      document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + item.dataset.view).classList.add('active');
      updateBottomNav(item.dataset.view);
      updateBrowserTitle();
    });
  });
  document.querySelector('.nav-item[data-view="timer-grid"]').classList.add('active');

  function updateBottomNav(activeView) {
    document.querySelectorAll('.bottom-nav-item').forEach(item => {
      item.classList.toggle('active', item.dataset.view === activeView);
    });
  }

  document.querySelectorAll('.bottom-nav-item[data-view]').forEach(item => {
    item.addEventListener('click', () => {
      initializeAudio();
      const view = item.dataset.view;
      document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const sideNavItem = document.querySelector(`.nav-item[data-view="${view}"]`);
      if (sideNavItem) sideNavItem.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
      updateBrowserTitle();
    });
  });

  const CIRC_CARD = 2 * Math.PI * 92;

  let defaultTimers = [
    { id: 1, name: '1 分', totalMs: 60000, remainingMs: 60000, running: false, finished: false, lastTick: 0, rafId: null },
    { id: 2, name: '3 分', totalMs: 180000, remainingMs: 180000, running: false, finished: false, lastTick: 0, rafId: null },
    { id: 3, name: '5 分', totalMs: 300000, remainingMs: 300000, running: false, finished: false, lastTick: 0, rafId: null },
    { id: 4, name: '10 分', totalMs: 600000, remainingMs: 600000, running: false, finished: false, lastTick: 0, rafId: null },
  ];

  let timers = [];
  let nextId = 1;
  let swRunning = false;
  let swElapsed = 0;
  let swStartTime = 0;

  function loadTimers() {
    const localData = localStorage.getItem('clock_app_timers');
    if (localData) {
      try {
        const parsed = JSON.parse(localData);
        timers = parsed.map(t => {
          t.running = false;
          t.finished = false;
          t.lastTick = 0;
          t.rafId = null;
          if (t.id >= nextId) nextId = t.id + 1;
          return t;
        });
      } catch (e) {
        timers = JSON.parse(JSON.stringify(defaultTimers));
        nextId = 5;
      }
    } else {
      timers = JSON.parse(JSON.stringify(defaultTimers));
      nextId = 5;
    }
  }

  function saveTimers() {
    const dataToSave = timers.map(t => ({
      id: t.id,
      name: t.name,
      totalMs: t.totalMs,
      remainingMs: t.totalMs
    }));
    localStorage.setItem('clock_app_timers', JSON.stringify(dataToSave));
  }

  function isAnyRunning() {
    return timers.some(t => t.running) || swRunning;
  }

  let editMode = false;
  const grid = document.getElementById('timer-grid');

  let alarmSound;
  let alarmPlaying = false;
  let audioInitialized = false;

  function initializeAudio() {
    if (!audioInitialized) {
      alarmSound = new Audio('alarm.wav');
      alarmSound.loop = true;
      audioInitialized = true;
    }
  }

  function playAlarm() {
    initializeAudio();
    if (!alarmPlaying) {
      alarmSound.play().catch(() => {});
      alarmPlaying = true;
    }
  }

  function stopAlarm() {
    if (alarmPlaying && alarmSound) {
      alarmSound.pause();
      alarmSound.currentTime = 0;
      alarmPlaying = false;
    }
  }

  function formatHMS(ms) {
    const totalSec = Math.ceil(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function formatMS(ms) {
    const totalSec = Math.floor(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${pad(m)}:${pad(s)}`;
  }

  function updateBrowserTitle() {
    let titleText = '時計';
    const runningTimers = timers.filter(t => t.running && !t.finished);
    if (runningTimers.length > 0) {
      let latestTimer = runningTimers.reduce((prev, current) => (prev.id > current.id) ? prev : current);
      const timeStr = formatHMS(latestTimer.remainingMs);
      titleText = timeStr + ' - タイマー';
    } else if (swRunning) {
      const now = swElapsed + (performance.now() - swStartTime);
      const timeStr = formatMS(now);
      titleText = timeStr + ' - ストップウォッチ';
    }
    document.title = titleText;
  }

  function renderGrid() {
    grid.innerHTML = '';
    timers.forEach(t => {
      const card = document.createElement('div');
      card.className = 'timer-card' + (editMode ? ' edit-mode' : '');
      card.dataset.cardId = t.id;
      card.innerHTML = `
        <div class="timer-card-head">
          <div class="timer-card-title">${t.name}</div>
          <button class="delete-btn" data-delete="${t.id}" title="削除">
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </div>
        <div class="timer-card-body">
          <div class="timer-ring-box">
            <svg viewBox="0 0 200 200">
              <circle class="ring-track-c" cx="100" cy="100" r="92"></circle>
              <circle class="ring-progress-c" data-ring="${t.id}" cx="100" cy="100" r="92"
                stroke-dasharray="${CIRC_CARD}" stroke-dashoffset="${CIRC_CARD}"></circle>
            </svg>
            <div class="timer-card-time" data-time="${t.id}">${formatHMS(t.remainingMs)}</div>
          </div>
          <div class="timer-card-controls">
            <button class="pill-btn play" data-play="${t.id}" title="開始">
              <i class="fa-solid fa-play" data-icon="${t.id}"></i>
            </button>
            <button class="pill-btn secondary" data-reset="${t.id}" ${t.remainingMs === t.totalMs ? 'disabled' : ''} title="リセット">
              <i class="fa-solid fa-arrow-rotate-left"></i>
            </button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.id = 'open-add-dialog-card';
    addCard.innerHTML = `<i class="fa-solid fa-plus"></i><span>新しいタイマーの追加</span>`;
    grid.appendChild(addCard);
    addCard.addEventListener('click', openDialog);

    grid.querySelectorAll('[data-play]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (editMode) return;
        toggleTimer(parseInt(btn.dataset.play, 10));
      });
    });
    grid.querySelectorAll('[data-reset]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (editMode) return;
        resetTimer(parseInt(btn.dataset.reset, 10));
      });
    });
    grid.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTimer(parseInt(btn.dataset.delete, 10));
      });
    });
    grid.querySelectorAll('.timer-card').forEach(card => {
      card.addEventListener('click', () => {
        openEditDialog(parseInt(card.dataset.cardId, 10));
      });
    });
    syncAllVisuals();
  }

  function syncVisual(t) {
    const ring = grid.querySelector(`[data-ring="${t.id}"]`);
    const timeEl = grid.querySelector(`[data-time="${t.id}"]`);
    const icon = grid.querySelector(`[data-icon="${t.id}"]`);
    const playBtn = grid.querySelector(`[data-play="${t.id}"]`);
    const resetBtn = grid.querySelector(`[data-reset="${t.id}"]`);
    if (!ring || !timeEl) return;
    let offset = CIRC_CARD;
    if (t.totalMs > 0 && t.remainingMs !== t.totalMs) {
      const remainingFrac = t.remainingMs / t.totalMs;
      offset = CIRC_CARD * (1 - remainingFrac);
    }
    ring.setAttribute('stroke-dashoffset', offset);
    timeEl.textContent = formatHMS(t.remainingMs);
    timeEl.classList.toggle('finished', t.finished);
    if (icon) {
      if (t.running) {
        icon.className = 'fa-solid fa-pause';
      } else {
        icon.className = 'fa-solid fa-play';
      }
    }
    if (playBtn) playBtn.classList.toggle('is-running', t.running);
    if (resetBtn) resetBtn.disabled = (t.remainingMs === t.totalMs) && !t.running;
  }
  function syncAllVisuals() { timers.forEach(syncVisual); }

  function tickTimer(t) {
    const now = performance.now();
    const delta = now - t.lastTick;
    t.lastTick = now;
    t.remainingMs -= delta;
    if (t.remainingMs <= 0) {
      t.remainingMs = 0;
      t.running = false;
      t.finished = true;
      syncVisual(t);
      playAlarm();
      showTimerToast(t);
      updateBrowserTitle();
      return;
    }
    syncVisual(t);
    updateBrowserTitle();
    t.rafId = requestAnimationFrame(() => tickTimer(t));
  }

  function syncVisualNoTransition(t) {
    const ring = grid.querySelector(`[data-ring="${t.id}"]`);
    if (!ring) {
      syncVisual(t);
      return;
    }
    ring.style.transition = 'none';
    syncVisual(t);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { ring.style.transition = ''; });
    });
  }

  function toggleTimer(id) {
    initializeAudio();
    const t = timers.find(x => x.id === id);
    if (!t) return;
    if (t.finished) {
      t.finished = false;
      t.remainingMs = t.totalMs;
    }
    if (!t.running) {
      t.running = true;
      t.lastTick = performance.now();
      t.rafId = requestAnimationFrame(() => tickTimer(t));
      syncVisualNoTransition(t);
    } else {
      t.running = false;
      cancelAnimationFrame(t.rafId);
      syncVisual(t);
    }
    updateBrowserTitle();
  }

  function resetTimer(id) {
    const t = timers.find(x => x.id === id);
    if (!t) return;
    t.running = false;
    t.finished = false;
    cancelAnimationFrame(t.rafId);
    t.remainingMs = t.totalMs;
    syncVisualNoTransition(t);
    updateBrowserTitle();
  }

  function deleteTimer(id) {
    const t = timers.find(x => x.id === id);
    if (t) cancelAnimationFrame(t.rafId);
    timers = timers.filter(x => x.id !== id);
    saveTimers();
    renderGrid();
    updateBrowserTitle();
  }

  function setEditMode(on) {
    editMode = on;
    const btn = document.getElementById('edit-mode-btn');
    btn.classList.toggle('active', editMode);
    btn.innerHTML = editMode
      ? '<i class="fa-solid fa-check"></i>'
      : '<i class="fa-solid fa-pen"></i>';
    renderGrid();
  }

  document.getElementById('edit-mode-btn').addEventListener('click', () => setEditMode(!editMode));

  loadTimers();
  renderGrid();

  const overlay = document.getElementById('dialog-overlay');
  const dialogTitle = document.getElementById('dialog-title');
  const dH = document.getElementById('d-h');
  const dM = document.getElementById('d-m');
  const dS = document.getElementById('d-s');
  const dName = document.getElementById('d-name');
  const dDelete = document.getElementById('d-delete');
  let editingId = null;

  function generateUniqueTimerName() {
    let candidate = 'タイマー (1)';
    let currentNum = 1;
    while (timers.some(t => t.name === candidate)) {
      currentNum++;
      candidate = `タイマー (${currentNum})`;
    }
    return candidate;
  }

  function openDialog() {
    editingId = null;
    dialogTitle.textContent = '新しいタイマーの追加';
    dDelete.style.display = 'none';
    dH.value = '00'; dM.value = '00'; dS.value = '00';
    dName.value = '';
    dName.placeholder = generateUniqueTimerName();
    overlay.classList.add('active');
    dH.focus();
  }

  function openEditDialog(id) {
    if (editMode) return;
    const t = timers.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    dialogTitle.textContent = 'タイマーの編集';
    dDelete.style.display = 'flex';
    const totalSec = Math.round(t.totalMs / 1000);
    dH.value = pad(Math.floor(totalSec / 3600));
    dM.value = pad(Math.floor((totalSec % 3600) / 60));
    dS.value = pad(totalSec % 60);
    dName.value = t.name;
    dName.placeholder = '';
    overlay.classList.add('active');
  }

  document.getElementById('open-add-dialog').addEventListener('click', openDialog);
  document.getElementById('d-cancel').addEventListener('click', () => overlay.classList.remove('active'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

  dDelete.addEventListener('click', () => {
    if (editingId !== null) deleteTimer(editingId);
    overlay.classList.remove('active');
  });

  function clampSpinner(input, max) {
    let v = parseInt(input.value, 10);
    if (isNaN(v) || v < 0) v = 0;
    if (v > max) v = max;
    input.value = pad(v);
  }
  dH.addEventListener('change', () => clampSpinner(dH, 99));
  dM.addEventListener('change', () => clampSpinner(dM, 59));
  dS.addEventListener('change', () => clampSpinner(dS, 59));

  document.querySelectorAll('.spin-arrow').forEach(arrow => {
    arrow.addEventListener('click', () => {
      const input = document.getElementById(arrow.dataset.target);
      const dir = parseInt(arrow.dataset.dir, 10);
      const max = input === dH ? 99 : 59;
      let v = (parseInt(input.value, 10) || 0) + dir;
      if (v < 0) v = max;
      if (v > max) v = 0;
      input.value = pad(v);
    });
  });

  document.getElementById('d-save').addEventListener('click', () => {
    const h = parseInt(dH.value, 10) || 0;
    const m = parseInt(dM.value, 10) || 0;
    const s = parseInt(dS.value, 10) || 0;
    const totalMs = (h * 3600 + m * 60 + s) * 1000;
    if (totalMs <= 0) return;

    if (editingId !== null) {
      const t = timers.find(x => x.id === editingId);
      if (t) {
        t.totalMs = totalMs;
        t.remainingMs = totalMs;
        t.running = false;
        t.finished = false;
        cancelAnimationFrame(t.rafId);
        t.name = dName.value.trim() || t.name;
      }
    } else {
      const label = dName.value.trim() || dName.placeholder || 'タイマー (1)';
      timers.push({
        id: nextId++, name: label, totalMs, remainingMs: totalMs,
        running: false, finished: false, lastTick: 0, rafId: null
      });
    }
    saveTimers();
    renderGrid();
    overlay.classList.remove('active');
    updateBrowserTitle();
  });

  (function () {
    let running = false;
    let startTime = 0;
    let elapsed = 0;
    let rafId = null;
    let laps = [];

    const hEl = document.getElementById('sw-h');
    const mEl = document.getElementById('sw-m');
    const sEl = document.getElementById('sw-s');
    const csEl = document.getElementById('sw-cs');
    const startBtn = document.getElementById('sw-start');
    const lapBtn = document.getElementById('sw-lap');
    const resetBtn = document.getElementById('sw-reset');
    const lapsPanel = document.getElementById('laps-panel');
    const icon = document.getElementById('sw-icon');

    function format(ms) {
      const totalMs = Math.floor(ms);
      const h = Math.floor(totalMs / 3600000);
      const m = Math.floor((totalMs % 3600000) / 60000);
      const s = Math.floor((totalMs % 60000) / 1000);
      const cs = Math.floor((totalMs % 1000) / 10);
      return { h: pad(h), m: pad(m), s: pad(s), cs: pad(cs) };
    }

    function render() {
      const now = running ? elapsed + (performance.now() - startTime) : elapsed;
      const f = format(now);
      hEl.textContent = f.h; mEl.textContent = f.m; sEl.textContent = f.s; csEl.textContent = '.' + f.cs;
      if (running) {
        swElapsed = elapsed;
        swStartTime = startTime;
        rafId = requestAnimationFrame(render);
        updateBrowserTitle();
      }
    }

    function setIconPause() { icon.className = 'fa-solid fa-pause'; }
    function setIconPlay() { icon.className = 'fa-solid fa-play'; }

    startBtn.addEventListener('click', () => {
      initializeAudio();
      if (!running) {
        running = true;
        swRunning = true;
        startTime = performance.now();
        swStartTime = startTime;
        startBtn.classList.add('is-running');
        setIconPause();
        lapBtn.disabled = false;
        resetBtn.disabled = false;
        render();
      } else {
        running = false;
        swRunning = false;
        elapsed += performance.now() - startTime;
        cancelAnimationFrame(rafId);
        startBtn.classList.remove('is-running');
        setIconPlay();
        lapBtn.disabled = true;
        updateBrowserTitle();
      }
    });

    lapBtn.addEventListener('click', () => {
      if (!running) return;
      const now = elapsed + (performance.now() - startTime);
      laps.unshift(now);
      renderLaps();
    });

    resetBtn.addEventListener('click', () => {
      running = false;
      swRunning = false;
      cancelAnimationFrame(rafId);
      elapsed = 0;
      laps = [];
      startBtn.classList.remove('is-running');
      setIconPlay();
      lapBtn.disabled = true;
      resetBtn.disabled = true;
      hEl.textContent = '00'; mEl.textContent = '00'; sEl.textContent = '00'; csEl.textContent = '.00';
      renderLaps();
      updateBrowserTitle();
    });

    function fmtFull(ms) {
      const f = format(ms);
      return `${f.h}:${f.m}:${f.s}.${f.cs}`;
    }

    function renderLaps() {
      lapsPanel.innerHTML = '';
      if (laps.length === 0) return;
      const diffs = laps.map((t, i) => i === laps.length - 1 ? t : t - laps[i + 1]);
      const fastest = Math.min(...diffs);
      const slowest = Math.max(...diffs);
      laps.forEach((t, idx) => {
        const lapNum = laps.length - idx;
        const diff = diffs[idx];
        const row = document.createElement('div');
        row.className = 'lap-row';
        if (diffs.length > 1 && diff === fastest) row.classList.add('fastest');
        if (diffs.length > 1 && diff === slowest) row.classList.add('slowest');
        row.innerHTML = `<span class="lap-index">ラップ ${lapNum}</span><span class="lap-diff">${fmtFull(diff)}</span><span>${fmtFull(t)}</span>`;
        lapsPanel.appendChild(row);
      });
    }
  })();

  const toastStack = document.getElementById('toast-stack');

  function formatClockTime(date) {
    const h = date.getHours();
    const m = date.getMinutes();
    return `${pad(h)}:${pad(m)}`;
  }

  function stopAlarmSound() {
    stopAlarm();
  }

  function showTimerToast(t) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    const timeLabel = formatClockTime(new Date());
    toast.innerHTML = `
      <div class="toast-head">
        <i class="fa-solid fa-clock toast-logo"></i>
        <span class="toast-app-name">時計</span>
        <button class="toast-close" title="閉じる">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="toast-body">
        <div class="toast-title">タイマーの終了</div>
        <div class="toast-sub">${t.name}</div>
        <div class="toast-sub">${timeLabel}</div>
      </div>
      <button class="toast-action">閉じる</button>
    `;

    function dismiss() {
      toast.classList.remove('show');
      toast.classList.add('hide');
      stopAlarmSound();
      setTimeout(() => toast.remove(), 350);
    }

    toast.addEventListener('click', dismiss);
    toast.querySelector('.toast-close').addEventListener('click', (e) => {
      e.stopPropagation();
      dismiss();
    });
    toast.querySelector('.toast-action').addEventListener('click', (e) => {
      e.stopPropagation();
      dismiss();
    });

    toastStack.appendChild(toast);
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
  }

  (function() {
    const savedTheme = localStorage.getItem('clock_app_theme') || 'system';
    const root = document.documentElement;

    function applyTheme(theme) {
      root.classList.remove('theme-light', 'theme-dark');
      if (theme === 'light') {
        root.classList.add('theme-light');
      } else if (theme === 'dark') {
        root.classList.add('theme-dark');
      }
    }

    applyTheme(savedTheme);

    const radioBtn = document.querySelector(`input[name="app-theme"][value="${savedTheme}"]`);
    if (radioBtn) radioBtn.checked = true;

    document.querySelectorAll('input[name="app-theme"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const theme = e.target.value;
        localStorage.setItem('clock_app_theme', theme);
        applyTheme(theme);
      });
    });

    document.getElementById('app-reset-btn').addEventListener('click', () => {
      if (confirm('アプリ設定とすべてのタイマーを初期状態にリセットしますか？')) {
        localStorage.removeItem('clock_app_timers');
        localStorage.removeItem('clock_app_theme');
        location.reload();
      }
    });
  })();

  window.addEventListener('beforeunload', function(e) {
    if (isAnyRunning()) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  setInterval(() => {
    updateBrowserTitle();
  }, 1000);

  const urlParams = new URLSearchParams(window.location.search);
  const viewParam = urlParams.get('view');
  if (viewParam === 'stopwatch' || viewParam === 'timer') {
    const targetView = viewParam === 'timer' ? 'timer-grid' : 'stopwatch';
    document.querySelectorAll('.nav-item[data-view], .bottom-nav-item[data-view]').forEach(item => {
      item.classList.toggle('active', item.dataset.view === targetView);
    });
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + targetView).classList.add('active');
  }
</script>
</body>
</html>
